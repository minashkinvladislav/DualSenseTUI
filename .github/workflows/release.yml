name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: macos-13
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --target "${{ matrix.target }}"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          version="$(awk -F\" '/^version =/ { print $2; exit }' Cargo.toml)"
          app_name="DualSenseTUI"
          archive_base="${app_name}-${version}-${{ matrix.target }}"
          staging_dir="dist/${archive_base}"
          archive_path="dist/${archive_base}.tar.gz"

          mkdir -p "$staging_dir"
          cp "target/${{ matrix.target }}/release/${app_name}" "$staging_dir/"
          cp README.md "$staging_dir/"
          cp CHANGELOG.md "$staging_dir/"
          mkdir -p "$staging_dir/docs"
          cp -R docs/screenshots "$staging_dir/docs/"
          tar -C dist -czf "$archive_path" "$archive_base"
          shasum -a 256 "$archive_path" > "${archive_path}.sha256"

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
