name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    name: fmt, test, clippy
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy -- -D warnings
