name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    name: fmt, test, clippy, desktop app
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build native desktop app
        run: scripts/build-macos-app.sh debug
